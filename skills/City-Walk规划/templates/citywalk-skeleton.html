<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{THEME}} · {{AREA}} City Walk</title>

  <!-- Tailwind CSS -->
  <link href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://lf6-cdn-tos.bytecdntp.com/cdn/expire-100-M/font-awesome/6.0.0/css/all.min.css">
  <!-- 中文字体 -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Leaflet.js 地图 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    /* ===== CSS 变量 — City Walk 城市绿主题 ===== */
    :root {
      --primary: #2D9D78;
      --primary-light: #7BCBB0;
      --primary-dark: #1E7D5E;
      --secondary: #2C3E50;
      --secondary-light: #5D7B93;
      --accent: #F39C12;
      --accent-light: #FFF3CD;
      --bg-warm: #F8FAF9;
      --bg-cool: #EFF6F3;
      --bg-white: #FFFFFF;
      --text-dark: #2D3436;
      --text-light: #636E72;
      --text-muted: #B2BEC3;
      --border-light: #E0EDE8;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.08);
      --card-hover-shadow: 0 8px 30px rgba(0,0,0,0.12);
      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;

      /* 站点类型颜色 */
      --color-coffee: #2D9D78;
      --color-food: #F39C12;
      --color-photo: #3498DB;
      --color-culture: #9B59B6;
      --color-art: #E91E63;
      --color-park: #27AE60;
      --color-shop: #E74C3C;
    }

    /* ===== 全局样式 ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text-dark);
      background: var(--bg-warm);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4 {
      font-family: 'Noto Serif SC', serif;
      font-weight: 600;
      line-height: 1.3;
    }

    /* ===== Hero 模块 ===== */
    .hero {
      background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
      color: white;
      padding: var(--spacing-xl) var(--spacing-md);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: float 20s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, -30px); }
    }
    .hero h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: var(--spacing-xs);
      position: relative;
    }
    .hero .subtitle {
      font-size: 1.1rem;
      opacity: 0.9;
      position: relative;
    }
    .hero .weather-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 0.5rem 1rem;
      border-radius: 50px;
      margin-top: var(--spacing-sm);
      font-size: 0.9rem;
      position: relative;
    }

    /* ===== 内容容器 ===== */
    .container {
      max-width: 768px;
      margin: 0 auto;
      padding: 0 var(--spacing-sm);
    }

    /* ===== 区块标题 ===== */
    .section-title {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: var(--spacing-xl) 0 var(--spacing-md);
    }
    .section-title i {
      font-size: 1.5rem;
      color: var(--primary);
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-cool);
      border-radius: 50%;
    }
    .section-title h2 {
      font-size: 1.5rem;
      color: var(--text-dark);
    }

    /* ===== 路线摘要徽章 ===== */
    .route-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: var(--spacing-md);
    }
    .route-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.4rem 0.8rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 500;
      background: var(--bg-white);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      color: var(--text-dark);
    }
    .route-badge i {
      color: var(--primary);
    }

    /* ===== 站点卡片（时间轴） ===== */
    .stop-timeline {
      position: relative;
      padding-left: 2rem;
    }
    .stop-timeline::before {
      content: '';
      position: absolute;
      left: 0.5rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--primary), var(--primary-light));
    }

    .stop-card {
      position: relative;
      background: var(--bg-white);
      border-radius: var(--radius-md);
      box-shadow: var(--card-shadow);
      margin-bottom: var(--spacing-sm);
      padding: var(--spacing-md);
      padding-left: calc(var(--spacing-md) + 0.5rem);
      border-left: 4px solid var(--primary);
      transition: box-shadow 0.3s ease;
    }
    .stop-card:hover {
      box-shadow: var(--card-hover-shadow);
    }
    .stop-card::before {
      content: '';
      position: absolute;
      left: -2.15rem;
      top: 1.5rem;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--primary);
      border: 3px solid white;
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    /* 站点类型颜色 */
    .stop-card.type-coffee { border-left-color: var(--color-coffee); }
    .stop-card.type-coffee::before { background: var(--color-coffee); box-shadow: 0 0 0 3px rgba(45,157,120,0.3); }
    .stop-card.type-food { border-left-color: var(--color-food); }
    .stop-card.type-food::before { background: var(--color-food); box-shadow: 0 0 0 3px rgba(243,156,18,0.3); }
    .stop-card.type-photo { border-left-color: var(--color-photo); }
    .stop-card.type-photo::before { background: var(--color-photo); box-shadow: 0 0 0 3px rgba(52,152,219,0.3); }
    .stop-card.type-culture { border-left-color: var(--color-culture); }
    .stop-card.type-culture::before { background: var(--color-culture); box-shadow: 0 0 0 3px rgba(155,89,182,0.3); }
    .stop-card.type-art { border-left-color: var(--color-art); }
    .stop-card.type-art::before { background: var(--color-art); box-shadow: 0 0 0 3px rgba(233,30,99,0.3); }
    .stop-card.type-park { border-left-color: var(--color-park); }
    .stop-card.type-park::before { background: var(--color-park); box-shadow: 0 0 0 3px rgba(39,174,96,0.3); }
    .stop-card.type-shop { border-left-color: var(--color-shop); }
    .stop-card.type-shop::before { background: var(--color-shop); box-shadow: 0 0 0 3px rgba(231,76,60,0.3); }

    .stop-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .stop-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .stop-name {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .stop-type-tag {
      font-size: 0.75rem;
      padding: 0.15rem 0.5rem;
      border-radius: 50px;
      background: var(--bg-cool);
      color: var(--primary);
      font-weight: 500;
    }
    .stop-desc {
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }
    .stop-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.6rem;
      border-radius: 50px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .tag-time { background: #D1ECF1; color: #0C5460; }
    .tag-deal { background: #E8F5E9; color: #2E7D32; }
    .tag-tip { background: #FFF3CD; color: #856404; }

    /* ===== 步行连接线 ===== */
    .walk-connector {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0 0.5rem 0.5rem;
      margin-left: 0.35rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      position: relative;
    }
    .walk-connector i {
      color: var(--primary-light);
    }

    /* ===== 地点导航链接 ===== */
    .nav-link {
      color: var(--primary-dark);
      text-decoration: none;
      cursor: pointer;
      border-bottom: 1px dashed var(--primary-light);
      transition: color 0.2s;
    }
    .nav-link:hover { color: var(--accent); }
    .nav-link i { margin-right: 0.25rem; font-size: 0.85rem; }

    /* ===== 地图 ===== */
    #walk-map {
      width: 100%;
      height: 400px;
      border-radius: var(--radius-md);
      box-shadow: var(--card-shadow);
      z-index: 1;
    }

    /* ===== 推荐卡片 ===== */
    .rec-card {
      background: var(--bg-white);
      border-radius: var(--radius-sm);
      padding: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
      border-left: 4px solid var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .rec-card .name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    .rec-card .meta {
      font-size: 0.85rem;
      color: var(--text-light);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    .rec-card .rating {
      color: var(--accent);
      font-weight: 600;
    }
    .rec-card .price {
      color: var(--primary);
      font-weight: 600;
    }
    .rec-card .deal-tag {
      display: inline-block;
      background: #E8F5E9;
      color: #2E7D32;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      margin-top: 0.25rem;
    }

    /* ===== 到达方式卡片 ===== */
    .arrival-card {
      background: var(--bg-white);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
      box-shadow: var(--card-shadow);
      margin-bottom: var(--spacing-sm);
    }
    .arrival-card h4 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .arrival-card h4 i {
      color: var(--primary);
    }
    .arrival-card p {
      font-size: 0.9rem;
      color: var(--text-light);
    }

    /* ===== 实用贴士 ===== */
    .tip-list {
      list-style: none;
      padding: 0;
    }
    .tip-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem 0;
      font-size: 0.9rem;
    }
    .tip-list li i {
      color: var(--primary);
      margin-top: 0.25rem;
      min-width: 1rem;
    }

    /* ===== 加载占位样式 ===== */
    .loading-placeholder {
      background: var(--bg-white);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      box-shadow: var(--card-shadow);
      text-align: center;
      color: var(--text-muted);
    }
    .loading-placeholder i {
      font-size: 2rem;
      margin-bottom: var(--spacing-sm);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* ===== 页脚 ===== */
    .footer {
      text-align: center;
      padding: var(--spacing-lg) var(--spacing-sm);
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 640px) {
      .hero h1 { font-size: 1.75rem; }
      .section-title h2 { font-size: 1.25rem; }
      #walk-map { height: 300px; }
      .container { padding: 0 0.75rem; }
      .route-badges { gap: 0.5rem; }
      .route-badge { font-size: 0.8rem; padding: 0.3rem 0.6rem; }
    }
  </style>
</head>
<body>

  <!-- ===== Step 2: Hero（由 Edit 替换此占位符） ===== -->
  <!-- {{HERO_CONTENT}} -->

  <main class="container">

    <!-- ===== Step 2: 路线摘要（由 Edit 替换此占位符） ===== -->
    <div class="section-title">
      <i class="fas fa-route"></i>
      <h2>路线概览</h2>
    </div>
    <!-- {{ROUTE_SUMMARY}} -->

    <!-- ===== Step 3: 站点时间轴（由 Edit 替换此占位符） ===== -->
    <div class="section-title">
      <i class="fas fa-map-pin"></i>
      <h2>漫步路线</h2>
    </div>
    <!-- {{STOP_CARDS}} -->

    <!-- ===== Step 4: 步行地图（由 Edit 替换此占位符） ===== -->
    <div class="section-title">
      <i class="fas fa-map-marked-alt"></i>
      <h2>路线地图</h2>
    </div>
    <div id="walk-map"></div>

    <!-- ===== Step 5: 沿途推荐（由 Edit 替换此占位符） ===== -->
    <div class="section-title">
      <i class="fas fa-star"></i>
      <h2>沿途推荐</h2>
    </div>
    <!-- {{FOOD_CARDS}} -->

    <!-- ===== Step 6: 如何到达（由 Edit 替换此占位符） ===== -->
    <div class="section-title">
      <i class="fas fa-subway"></i>
      <h2>如何到达</h2>
    </div>
    <!-- {{ARRIVAL_INFO}} -->

    <!-- ===== Step 6: 实用贴士（由 Edit 替换此占位符） ===== -->
    <div class="section-title">
      <i class="fas fa-lightbulb"></i>
      <h2>实用贴士</h2>
    </div>
    <!-- {{PRACTICAL_INFO}} -->

  </main>

  <footer class="footer">
    <p>🗺️ 由美团「小团」City Walk 规划师精心制作 · {{GENERATION_DATE}}</p>
  </footer>

  <script>
    // ===== 步行导航功能 =====
    function navigateTo(name, lat, lng) {
      const ua = navigator.userAgent;
      let url;
      if (/android/i.test(ua)) {
        url = `androidamap://navi?sourceApplication=citywalk&poiname=${encodeURIComponent(name)}&lat=${lat}&lon=${lng}&dev=0&t=2`;
      } else if (/iphone|ipad|ipod/i.test(ua)) {
        url = `iosamap://navi?sourceApplication=citywalk&poiname=${encodeURIComponent(name)}&lat=${lat}&lon=${lng}&dev=0&t=2`;
      } else {
        url = `https://uri.amap.com/navigation?to=${lng},${lat},${encodeURIComponent(name)}&mode=walk&coordinate=gaode`;
      }
      window.location.href = url;
    }

    // ===== Step 4: Leaflet 地图初始化（由 Edit 替换此占位符） =====
    // {{MAP_INIT_SCRIPT}}
  </script>
</body>
</html>
